<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untuk Kamu 🤍</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  font-family: 'Segoe UI', sans-serif;
  color: white;
  overflow: hidden;
}

.container {
  text-align: center;
  max-width: 600px;
  padding: 20px;
}

#text {
  font-size: 22px;
  line-height: 1.6;
  border-right: 2px solid white;
  display: inline-block;
  padding-right: 5px;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  0% { border-color: transparent; }
  50% { border-color: white; }
  100% { border-color: transparent; }
}

button {
  margin-top: 30px;
  padding: 10px 20px;
  border: none;
  background: white;
  color: #2c5364;
  font-size: 16px;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ddd;
}

.fade {
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>

</head>
<body>

<div class="container">
  <div id="text"></div>
  <br>
  <button onclick="lanjut()">Klik ini kalau kamu sudah baca ya...</button>
</div>

<script>
const pesan = [
  "Aku nggak tahu harus mulai dari mana...",
  "Tapi ada satu hal yang jujur banget...",
  "Aku masih menyukaimu...",
  "Sampai sekarang ini...",
  "Semoga kamu bisa mulai buka hati ke aku",
  "Jangan mikir hal yang ga berguna, aku selalu menantikan kita ketemu.",
  "Tetap sabar, tetap sayang, tetap sukai aku ya Widiari",
  "",
  "Aku cuma pengen kamu tahu itu."
];

let index = 0;
let charIndex = 0;

function ketik() {
  if (index < pesan.length) {
    if (charIndex < pesan[index].length) {
      document.getElementById("text").innerHTML += pesan[index].charAt(charIndex);
      charIndex++;
      setTimeout(ketik, 50);
    } else {
      document.getElementById("text").innerHTML += "<br>";
      index++;
      charIndex = 0;
      setTimeout(ketik, 700);
    }
  }
}

ketik();

function lanjut() {
  document.body.innerHTML = `
    <div class="container fade">
      <h2>🤍</h2>
      <p style="font-size:20px;">
        Makasih ya kirena<br><br>
        Semoga plan yang kita emang rencanain terkabul ya kiren<br><br>
        Sadhu Sadhu Sadhu
      </p>
    </div>
  `;
}
</script>

</body>
</html>
