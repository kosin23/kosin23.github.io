<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Selamat Ulang Tahun</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #1e1e2f, #2b5876);
  font-family: 'Segoe UI', sans-serif;
  color: white;
  overflow: hidden;
}

/* Floating particles */
.circle {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  animation: float 10s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

.container {
  text-align: center;
  max-width: 700px;
  padding: 40px;
  background: rgba(0,0,0,0.4);
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

p {
  font-size: 16px;
  line-height: 1.8;
  min-height: 200px;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #ff7675;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #e84393;
}
</style>

</head>

<body>

<!-- Floating elements -->
<div class="circle" style="width:60px;height:60px;left:10%;animation-duration:12s;"></div>
<div class="circle" style="width:30px;height:30px;left:40%;animation-duration:8s;"></div>
<div class="circle" style="width:80px;height:80px;left:70%;animation-duration:15s;"></div>
<div class="circle" style="width:25px;height:25px;left:85%;animation-duration:9s;"></div>

<div class="container">
  <h1>Selamat Ulang Tahun Kak Eny 🎂</h1>
  <p id="text">Maafkan saya yang semalam nih di klik aja.</p>
  <button onclick="startTyping()">Buka Pesan</button>
</div>

<script>
const message = `Hari ini bukan sekadar bertambah usia,
tapi juga bertambah perjalanan, pengalaman, dan cerita.

Di umur 27 ini,
semoga semua yang kak eny rencanakan selalu dimudahkan,
dan diberi jalan terbaik,
serta semua hal baik datang tanpa perlu dipaksa.

Semoga kak eny selalu sehat,
tetap kuat di setiap keadaan,
dan tetap jadi pribadi yang kakak banggakan.

Rahayu ring warsa nuju rahayu,
semoga panjang umur, sehat, lan becik rejekine.

Semoga apa yang belum bisa kaka capai,
perlahan bisa kakak raih satu per satu.

Dan kalau suatu hari terasa berat,
semoga kakak selalu ingat,
kakak tidak sendiri ada aing muehehe meskipun energi social ku terkuras tapi tak apa kak asli ni.

Selamat ulang tahun ya kak eny 祝你一切顺利 `;

let i = 0;

function startTyping() {
  document.getElementById("text").innerHTML = "";
  typeWriter();
}

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 30);
  }
}
</script>

</body>
</html>
