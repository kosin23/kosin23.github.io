<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快樂，再見</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0508;
    --paper: #12090f;
    --gold: #c9a84c;
    --rose: #c0414f;
    --blush: #e8a0a8;
    --text: #e8ddd5;
    --muted: #8a7a7a;
    --candle: #f5c842;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'Noto Serif TC', serif;
    color: var(--text);
    overflow-x: hidden;
    cursor: default;
  }

  /* Particle canvas */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* Scene wrapper */
  .scene {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
  }

  /* Candle */
  .candle-wrap {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-bottom: 40px;
    animation: fadeUp 1.2s ease both;
  }

  .candle {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .flame {
    width: 10px;
    height: 22px;
    background: radial-gradient(ellipse at 50% 80%, var(--candle) 40%, #f97316 70%, transparent 100%);
    border-radius: 50% 50% 30% 30%;
    animation: flicker 1.4s ease-in-out infinite alternate;
    filter: blur(0.5px);
    box-shadow: 0 0 10px 4px rgba(245,200,66,0.35), 0 0 30px 8px rgba(245,200,66,0.12);
    position: relative;
    top: 2px;
  }

  .wick {
    width: 2px;
    height: 6px;
    background: #555;
    border-radius: 1px;
  }

  .candle-body {
    width: 16px;
    height: 55px;
    background: linear-gradient(180deg, #f3e4d4 0%, #e8ccb8 40%, #d4a882 100%);
    border-radius: 3px 3px 2px 2px;
    position: relative;
    box-shadow: inset -3px 0 6px rgba(0,0,0,0.2);
  }

  .candle-drip {
    position: absolute;
    top: 8px;
    left: -2px;
    width: 5px;
    height: 12px;
    background: #f0d8c0;
    border-radius: 0 0 50% 50%;
    opacity: 0.7;
  }

  @keyframes flicker {
    0%   { transform: scaleX(1) scaleY(1) rotate(-1deg); opacity: 1; }
    30%  { transform: scaleX(0.85) scaleY(1.08) rotate(1.5deg); opacity: 0.92; }
    60%  { transform: scaleX(1.1) scaleY(0.95) rotate(-0.5deg); opacity: 0.97; }
    100% { transform: scaleX(0.9) scaleY(1.05) rotate(2deg); opacity: 0.88; }
  }

  /* Cake */
  .cake-wrap {
    margin-bottom: 50px;
    animation: fadeUp 1.4s 0.2s ease both;
    position: relative;
  }

  .cake {
    width: 120px;
    height: 70px;
    position: relative;
  }

  .cake-tier {
    position: absolute;
    border-radius: 6px;
    overflow: hidden;
  }

  .cake-top {
    width: 80px;
    height: 28px;
    background: linear-gradient(180deg, #d4506a 0%, #b03050 100%);
    top: 0; left: 20px;
    box-shadow: 0 3px 12px rgba(180,50,80,0.4);
  }

  .cake-top::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: repeating-linear-gradient(90deg, #f08898 0 8px, #c06070 8px 16px);
    border-radius: 6px 6px 0 0;
  }

  .cake-bottom {
    width: 120px;
    height: 38px;
    background: linear-gradient(180deg, #c04060 0%, #8a2040 100%);
    bottom: 0; left: 0;
    box-shadow: 0 6px 20px rgba(140,30,60,0.5);
  }

  .cake-bottom::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 10px;
    background: repeating-linear-gradient(90deg, #e87890 0 10px, #b04060 10px 20px);
  }

  /* Decorative border */
  .envelope {
    position: relative;
    max-width: 560px;
    width: 100%;
    animation: fadeUp 1.6s 0.4s ease both;
  }

  .envelope-inner {
    background: linear-gradient(145deg, #1a0e14 0%, #140b11 100%);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 2px;
    padding: 48px 48px 44px;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(201,168,76,0.08),
      0 20px 60px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(201,168,76,0.15);
  }

  .envelope-inner::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 1px;
    pointer-events: none;
  }

  /* Corner ornaments */
  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    opacity: 0.5;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 12px; left: 12px; }
  .corner-tr { top: 12px; right: 12px; transform: scaleX(-1); }
  .corner-bl { bottom: 12px; left: 12px; transform: scaleY(-1); }
  .corner-br { bottom: 12px; right: 12px; transform: scale(-1); }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 0 28px;
    opacity: 0.5;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .divider-dot {
    width: 5px;
    height: 5px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--gold);
  }

  /* Message */
  .message-body {
    font-size: 16px;
    line-height: 2.1;
    color: #d5c8c0;
    font-weight: 300;
    letter-spacing: 0.04em;
    text-align: justify;
    position: relative;
  }

  .message-body p {
    margin-bottom: 18px;
  }

  .message-body p:last-child {
    margin-bottom: 0;
  }

  /* Highlight key phrases */
  .emo {
    color: var(--blush);
  }

  .closing {
    display: block;
    margin-top: 32px;
    text-align: right;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--rose);
    letter-spacing: 0.06em;
    text-shadow: 0 0 20px rgba(192,65,79,0.4);
  }

  /* Title above card */
  .title-area {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeUp 1s ease both;
  }

  .title-zh {
    font-size: 13px;
    letter-spacing: 0.35em;
    color: var(--gold);
    opacity: 0.7;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .title-main {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 28px;
    color: var(--blush);
    text-shadow: 0 0 30px rgba(232,160,168,0.3);
    letter-spacing: 0.02em;
  }

  /* Petals */
  .petal {
    position: fixed;
    width: 8px;
    height: 12px;
    border-radius: 50% 0 50% 0;
    opacity: 0;
    pointer-events: none;
    z-index: 2;
    animation: petalFall linear infinite;
  }

  @keyframes petalFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .envelope-inner { padding: 32px 24px 28px; }
    .message-body { font-size: 15px; }
    .title-main { font-size: 22px; }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- Falling petals -->
<div id="petals"></div>

<div class="scene">

  <!-- Candles -->
  <div class="candle-wrap">
    <div class="candle"><div class="flame"></div><div class="wick"></div><div class="candle-body"><div class="candle-drip"></div></div></div>
    <div class="candle"><div class="flame"></div><div class="wick"></div><div class="candle-body"></div></div>
    <div class="candle"><div class="flame"></div><div class="wick"></div><div class="candle-body"><div class="candle-drip"></div></div></div>
  </div>

  <!-- Cake -->
  <div class="cake-wrap">
    <div class="cake">
      <div class="cake-tier cake-top"></div>
      <div class="cake-tier cake-bottom"></div>
    </div>
  </div>

  <!-- Title -->
  <div class="title-area">
    <div class="title-zh">最後的話</div>
    <div class="title-main">A Letter Left Unsent</div>
  </div>

  <!-- Card -->
  <div class="envelope">
    <div class="envelope-inner">

      <!-- Corner ornaments -->
      <div class="corner corner-tl">
        <svg viewBox="0 0 28 28" fill="none">
          <path d="M2 2 L12 2 L12 4 L4 4 L4 12 L2 12 Z" fill="#c9a84c"/>
          <circle cx="14" cy="14" r="2" fill="#c9a84c" opacity="0.5"/>
        </svg>
      </div>
      <div class="corner corner-tr">
        <svg viewBox="0 0 28 28" fill="none">
          <path d="M2 2 L12 2 L12 4 L4 4 L4 12 L2 12 Z" fill="#c9a84c"/>
          <circle cx="14" cy="14" r="2" fill="#c9a84c" opacity="0.5"/>
        </svg>
      </div>
      <div class="corner corner-bl">
        <svg viewBox="0 0 28 28" fill="none">
          <path d="M2 2 L12 2 L12 4 L4 4 L4 12 L2 12 Z" fill="#c9a84c"/>
          <circle cx="14" cy="14" r="2" fill="#c9a84c" opacity="0.5"/>
        </svg>
      </div>
      <div class="corner corner-br">
        <svg viewBox="0 0 28 28" fill="none">
          <path d="M2 2 L12 2 L12 4 L4 4 L4 12 L2 12 Z" fill="#c9a84c"/>
          <circle cx="14" cy="14" r="2" fill="#c9a84c" opacity="0.5"/>
        </svg>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-dot"></div>
        <div class="divider-line"></div>
      </div>

      <div class="message-body">
        <p>夠了，真的夠了。<span class="emo">我不能再對你抱持任何期望了。</span>想太多讓我很累，根本睡不著。</p>

        <p>我只是提了幾個簡單的要求，但你似乎從來不在乎。我只是希望你至少能發點關於我禮物的內容，我知道你不喜歡發帖，但<span class="emo">這真的很難嗎？還是你根本不在乎我的存在？</span></p>

        <p>難道我還要隱藏自己的存在嗎？</p>

        <p>還有，<span class="emo">打個電話真的那麼難嗎？</span>你以前總是會打電話，即使在工作的時候也會打。難道你有了別人？</p>

        <p>好吧，那我就接受這個事實……</p>

        <span class="closing">對了，生日快樂。</span>
      </div>

      <div class="divider" style="margin-top:28px; margin-bottom:0;">
        <div class="divider-line"></div>
        <div class="divider-dot"></div>
        <div class="divider-line"></div>
      </div>

    </div>
  </div>

</div>

<script>
// ── Particle canvas (floating sparks) ──────────────────────────────
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function rand(a, b) { return Math.random() * (b - a) + a; }

for (let i = 0; i < 55; i++) {
  particles.push({
    x: rand(0, 1),
    y: rand(0, 1),
    r: rand(0.5, 2),
    vx: rand(-0.15, 0.15),
    vy: rand(-0.4, -0.1),
    alpha: rand(0.1, 0.5),
    color: Math.random() < 0.5 ? '#c9a84c' : '#c0414f'
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    p.x += p.vx / W * 60;
    p.y += p.vy / H * 60;
    if (p.y < -0.02) p.y = 1.02;
    if (p.x < -0.02) p.x = 1.02;
    if (p.x > 1.02) p.x = -0.02;
    ctx.beginPath();
    ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.alpha;
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  requestAnimationFrame(drawParticles);
}
drawParticles();

// ── Falling rose petals ────────────────────────────────────────────
const container = document.getElementById('petals');
const colors = ['#c0414f','#d4506a','#e8a0a8','#b03050','#c9a84c'];

for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  p.style.cssText = `
    left: ${Math.random() * 100}vw;
    background: ${colors[Math.floor(Math.random() * colors.length)]};
    animation-duration: ${6 + Math.random() * 8}s;
    animation-delay: ${Math.random() * 10}s;
    transform: rotate(${Math.random() * 360}deg);
    opacity: 0;
  `;
  container.appendChild(p);
}
</script>
</body>
</html>
