<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untuk Kamu</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #2a1a4a, #0f172a 70%);
  overflow: hidden;
}

/* GLOW */
body::before {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: #ff4ecd;
  filter: blur(150px);
  top: -100px;
  left: -100px;
  opacity: 0.4;
}
body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: #00f2fe;
  filter: blur(150px);
  bottom: -100px;
  right: -100px;
  opacity: 0.4;
}

/* CHAT */
.chat-box {
  width: 330px;
  height: 500px;
  padding: 20px;
  border-radius: 25px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 0 50px rgba(0,0,0,0.5);
  overflow-y: auto;
  z-index: 2;
}

/* SCROLLBAR CUSTOM */
.chat-box::-webkit-scrollbar {
  width: 6px;
}
.chat-box::-webkit-scrollbar-track {
  background: transparent;
}
.chat-box::-webkit-scrollbar-thumb {
  background: linear-gradient(#ff4ecd, #00f2fe);
  border-radius: 10px;
}

/* MESSAGE */
.message {
  padding: 12px 16px;
  margin: 10px 0;
  border-radius: 20px;
  max-width: 75%;
  font-size: 14px;
  color: white;
  animation: fadeIn 0.4s ease;
}

.me {
  margin-left: auto;
  background: linear-gradient(135deg, #ff4ecd, #00f2fe);
  box-shadow: 0 4px 20px rgba(255, 78, 205, 0.5);
}

/* TYPING */
.typing {
  font-size: 13px;
  color: #fff;
  opacity: 0.9;
  margin: 8px;
  text-shadow: 0 0 8px rgba(255,255,255,0.8);
  animation: blink 1s infinite;
}

/* ANIMASI */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes blink {
  50% { opacity: 0.3; }
}

/* BUTTON START */
.start-btn {
  position: absolute;
  z-index: 5;
  padding: 12px 20px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(135deg, #ff4ecd, #00f2fe);
  color: white;
  font-size: 14px;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(255, 78, 205, 0.6);
}
</style>
</head>

<body>

<button class="start-btn" onclick="startAll()">Klik dulu ya 😊</button>

<div class="chat-box" id="chat"></div>

<!-- AUDIO (ganti link kalau mau versi lain) -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2021/11/25/audio_91b4c2cce6.mp3?filename=soft-piano-100-bpm-121529.mp3" type="audio/mpeg">
</audio>

<script>
const messages = [
  "kamu lagi sama temen ya?",
  "seru ga?",
  "aku ganggu ga sih...",
  "gapapa sih kalau kamu emang enjoy dan fun",
  "aku cuma mau bilang...",
  "aku nunggu kamu pulang 😊",
  "jangan lupa ya aku tunggu",
  "hati hati ya di jalan",
  "kalo emang malem ini ga bisa call gapapa ya jangan di paksa",
  "jangan pulang subuh ya widiari",
  "aku ga tau kamu lagi mikirin aku atau engga... tapi aku jelas mikirin kamu",
  "사랑해"
];

let i = 0;

function startAll() {
  document.querySelector(".start-btn").style.display = "none";

  const music = document.getElementById("music");
  music.volume = 0.4; // biar ga kaget
  music.play().catch(err => {
    console.log("Audio error:", err);
  });

  showMessage();
}

function showMessage() {
  if (i >= messages.length) return;

  const chat = document.getElementById("chat");

  const typing = document.createElement("div");
  typing.className = "typing";
  typing.innerText = "lagi ngetik...";
  chat.appendChild(typing);

  setTimeout(() => {
    typing.remove();

    const msg = document.createElement("div");
    msg.className = "message me";
    msg.innerText = messages[i];
    chat.appendChild(msg);

    chat.scrollTop = chat.scrollHeight;

    i++;
    setTimeout(showMessage, 1400);
  }, 900);
}
</script>

</body>
</html>
