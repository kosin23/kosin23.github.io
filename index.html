<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untuk Kamu 🤍</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #2b2d42, #1a1a2e);
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}

.container {
  max-width: 420px;
}

h2 {
  font-size: 20px;
  margin-bottom: 10px;
}

p {
  font-size: 14px;
  opacity: 0.8;
}

button {
  margin-top: 10px;
  padding: 14px 24px;
  border: none;
  border-radius: 25px;
  background: #8d99ae;
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #a8b2c1;
}

button:disabled {
  background: #555;
  cursor: not-allowed;
}

#message {
  margin-top: 25px;
  font-size: 17px;
  min-height: 60px;
  opacity: 0;
  transition: opacity 0.6s ease;
}
</style>

</head>

<body>

<div class="container">
  <h2>KHUSUS BUAT KIRENA KLEANTHA MAI BAO BAO 🤍</h2>
  <p>Kalo kamu gabut atau tiba-tiba kangen… klik aja ya 😊</p>

  <button id="btn" onclick="showMessage()">klik kalau kamu butuh ditemenin</button>

  <div id="message"></div>
</div>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1e64.mp3?filename=calm-ambient-110397.mp3" type="audio/mpeg">
</audio>

<script>
let messages = [
  "aloow aku disini kirena 🤍",
  "aku masih nunggu kamu, jangan lupa kabarin ya cinta🤍",
  "MAKAN.... JANGAN LUPA MAKAN YA SAYANG NTAR MUAL",
  "masih nunggu kamu di kol oleh widiari🤍 ",
  "kalo ketemu tulisan ini WAJIB KASIH SAJIN hehe🤍",
  "banyak MINUM sayang, jangan sampe dehidrasi",
  "have fun sayang, nikmatin waktu kamu🤍",
  "jujur aku udah abis kata kata… tapi tetep thinking about kamu🤍"
];

let started = false;

function showMessage() {
  const btn = document.getElementById("btn");
  const msg = document.getElementById("message");

  if (messages.length === 0) {
    msg.style.opacity = 0;

    setTimeout(() => {
      msg.innerText = "udah semua kamu baca… tapi aku masih disini 🤍";
      msg.style.opacity = 1;
    }, 200);

    return;
  }

  btn.disabled = true;

  const index = Math.floor(Math.random() * messages.length);
  const text = messages.splice(index, 1)[0];

  msg.style.opacity = 0;

  setTimeout(() => {
    msg.innerText = text;
    msg.style.opacity = 1;
  }, 200);

  if (!started) {
    const music = document.getElementById("music");
    music.volume = 0.15;
    music.play();
    started = true;
  }

  setTimeout(() => {
    btn.disabled = false;
  }, 3000);
}
</script>

</body>
</html>
